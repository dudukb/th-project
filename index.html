<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Vendas - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        :root {
            --bg-color: #121212; --card-bg: #1e1e1e; --text-main: #ffffff; --text-muted: #aaaaaa;
            --boleto-color: #4caf50; --tef-color: #2196f3; --alert-color: rgba(255, 99, 132, 0.3);
            --primary-btn: #ff9800; --danger-color: #ff6b6b;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1200px; }
        
        /* Navegação */
        .nav-meses { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; align-items: center; }
        .btn-mes { background: var(--card-bg); color: var(--text-main); border: 1px solid #333; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; white-space: nowrap; }
        .btn-mes.active { background: var(--primary-btn); color: #000; border-color: var(--primary-btn); }
        .btn-add-mes { background: transparent; border: 1px dashed var(--text-muted); color: var(--text-muted); padding: 8px 15px; border-radius: 8px; cursor: pointer; }

        /* Cabeçalho */
        .header-panel { background: var(--card-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .title-wrapper { display: flex; align-items: center; gap: 15px; }
        .total-value { font-size: 2.5em; color: var(--text-main); font-weight: bold; }
        .btn-delete-mes { background: rgba(255, 99, 132, 0.1); color: var(--danger-color); border: 1px solid var(--danger-color); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* Formulário */
        .form-venda { display: flex; gap: 10px; flex-wrap: wrap; background: #252525; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .form-venda input, .form-venda select { background: #121212; color: white; border: 1px solid #444; padding: 8px; border-radius: 4px; }
        .form-venda button { background: var(--boleto-color); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* Cards e Gráficos */
        .summary-cards { display: flex; gap: 20px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; flex: 1; min-width: 200px; text-align: center; border-top: 4px solid #555; }
        .card.boleto { border-top-color: var(--boleto-color); }
        .card.tef { border-top-color: var(--tef-color); }
        .charts-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-container { background: var(--card-bg); padding: 20px; border-radius: 12px; height: 350px; display: flex; flex-direction: column; align-items: center; }
        canvas { max-height: 280px; width: 100% !important; }

        /* Tabela */
        .table-container { background: var(--card-bg); padding: 20px; border-radius: 12px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: center; }
        th, td { padding: 12px; border-bottom: 1px solid #333; }
        .row-alert { background-color: var(--alert-color) !important; color: #ffcccc; font-weight: bold; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.85em; font-weight: bold; }
        .badge-boleto { background: rgba(76, 175, 80, 0.2); color: #81c784; border: 1px solid var(--boleto-color); }
        .badge-tef { background: rgba(33, 150, 243, 0.2); color: #64b5f6; border: 1px solid var(--tef-color); }
        .empty-state { text-align: center; color: var(--text-muted); padding: 40px; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-meses" id="navMeses"></div>

        <div class="header-panel">
            <div class="total-box">
                <div class="title-wrapper">
                    <h2 id="mesAtualTitulo">Faturamento</h2>
                    <button class="btn-delete-mes" onclick="excluirMesAtual()">🗑️ Excluir Mês</button>
                </div>
                <div class="total-value" id="displayTotal">R$ 0,00</div>
            </div>
            <form class="form-venda" id="formVenda">
                <input type="text" id="inputLead" placeholder="Lead" required>
                <input type="text" id="inputPedido" placeholder="Nº Pedido" required>
                <input type="number" id="inputValor" placeholder="Valor (R$)" step="0.01" required>
                <select id="inputMetodo">
                    <option value="Boleto">Boleto</option>
                    <option value="Cartão de Crédito / TEF">Cartão / TEF</option>
                </select>
                <button type="submit">+ Adicionar</button>
            </form>
        </div>

        <div class="summary-cards">
            <div class="card boleto"><h3>Ticket Médio Boleto</h3><div class="value" id="tmb">R$ 0,00</div></div>
            <div class="card tef"><h3>Ticket Médio Cartão / TEF</h3><div class="value" id="tmt">R$ 0,00</div></div>
        </div>

        <div class="charts-wrapper">
            <div class="chart-container"><h3>Volume (Qtd)</h3><canvas id="chartQuantidade"></canvas></div>
            <div class="chart-container"><h3>Faturamento (R$)</h3><canvas id="chartValor"></canvas></div>
        </div>

        <div class="table-container">
            <table>
                <thead><tr><th>Lead</th><th>Nº Pedido</th><th>Valor</th><th>Pagamento</th><th>Ação</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        Chart.register(ChartDataLabels);
        Chart.defaults.color = '#aaaaaa';
        let chartQtdInstance = null, chartValorInstance = null;
        
        // Iniciando apenas com Janeiro vazio
        const estruturaInicial = { "Janeiro": [] };
        let bancoDeDados = JSON.parse(localStorage.getItem('sistemaVendasData')) || estruturaInicial;
        let mesAtivo = Object.keys(bancoDeDados)[0] || "Janeiro";

        function salvar() { localStorage.setItem('sistemaVendasData', JSON.stringify(bancoDeDados)); }
        const formataBRL = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

        function renderizarTudo() {
            const nav = document.getElementById('navMeses'); nav.innerHTML = '';
            
            Object.keys(bancoDeDados).forEach(m => {
                const btn = document.createElement('button');
                btn.className = btn-mes ${m === mesAtivo ? 'active' : ''};
                btn.innerText = m; btn.onclick = () => { mesAtivo = m; renderizarTudo(); };
                nav.appendChild(btn);
            });

            const btnAdd = document.createElement('button');
            btnAdd.className = 'btn-add-mes';
            btnAdd.innerText = '+ Novo Mês';
            btnAdd.onclick = adicionarMes;
            nav.appendChild(btnAdd);

            document.getElementById('mesAtualTitulo').innerText = Faturamento - ${mesAtivo};
            const dadosMes = bancoDeDados[mesAtivo] || [];
            let stats = { boleto: { q: 0, t: 0 }, tef: { q: 0, t: 0 }, total: 0 };
            const tbody = document.getElementById('tableBody'); tbody.innerHTML = '';

            if (dadosMes.length === 0) {
                tbody.innerHTML = <tr><td colspan="5" class="empty-state">Nenhuma venda em ${mesAtivo}. Adicione acima!</td></tr>;
            } else {
                dadosMes.forEach(i => {
                    let tipo = i.metodo.includes("Boleto") ? 'boleto' : 'tef';
                    stats[tipo].q++; stats[tipo].t += i.valor; stats.total += i.valor;
                    let tr = document.createElement('tr');
                    if(i.lead.toUpperCase() === "CARLOS") tr.className = 'row-alert';
                    tr.innerHTML = `<td>${i.lead}</td><td>${i.pedido}</td><td>${formataBRL(i.valor)}</td>
                    <td><span class="badge ${tipo === 'boleto' ? 'badge-boleto' : 'badge-tef'}">${i.metodo}</span></td>
                    <td><button onclick="excluirVenda(${i.id})" style="background:none; border:none; color:red; cursor:pointer;">❌</button></td>`;
                    tbody.appendChild(tr);
                });
            }

            document.getElementById('displayTotal').innerText = formataBRL(stats.total);
            document.getElementById('tmb').innerText = formataBRL(stats.boleto.q ? stats.boleto.t/stats.boleto.q : 0);
            document.getElementById('tmt').innerText = formataBRL(stats.tef.q ? stats.tef.t/stats.tef.q : 0);
            atualizarGraficos(stats);
        }

        function atualizarGraficos(s) {
            if (chartQtdInstance) chartQtdInstance.destroy();
            if (chartValorInstance) chartValorInstance.destroy();

            const totalQtd = s.boleto.q + s.tef.q;

            chartQtdInstance = new Chart(document.getElementById('chartQuantidade'), {
                type: 'doughnut',
                data: { labels: ['Boleto', 'TEF'], datasets: [{ data: [s.boleto.q, s.tef.q], backgroundColor: ['#4caf50', '#2196f3'] }] },
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    plugins: { datalabels: { color: '#fff', formatter: (v) => totalQtd > 0 ? v + " (" + ((v/totalQtd)*100).toFixed(1) + "%)" : "" } } 
                }
            });

            chartValorInstance = new Chart(document.getElementById('chartValor'), {
                type: 'bar',
                data: { labels: ['Boleto', 'TEF'], datasets: [{ data: [s.boleto.t, s.tef.t], backgroundColor: ['#4caf50', '#2196f3'] }] },
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true } },
                    plugins: { datalabels: { color: '#fff', formatter: (v) => s.total > 0 ? formataBRL(v) : "" } } 
                }
            });
        }

        function adicionarMes() {
            const novoMes = prompt("Digite o nome do novo mês (ex: Fevereiro):");
            if (novoMes && novoMes.trim() !== "" && !bancoDeDados[novoMes]) {
                bancoDeDados[novoMes.trim()] = [];
                mesAtivo = novoMes.trim();
                salvar(); renderizarTudo();
            }
        }

        document.getElementById('formVenda').onsubmit = function(e) {
            e.preventDefault();
            bancoDeDados[mesAtivo].push({
                id: Date.now(), 
                lead: document.getElementById('inputLead').value,
                pedido: document.getElementById('inputPedido').value,
                valor: parseFloat(document.getElementById('inputValor').value),
                metodo: document.getElementById('inputMetodo').value
            });
            salvar(); renderizarTudo(); this.reset();
        };

        function excluirVenda(id) { 
            if(confirm("Deseja excluir esta venda?")) { 
                bancoDeDados[mesAtivo] = bancoDeDados[mesAtivo].filter(v => v.id !== id); 
                salvar(); renderizarTudo(); 
            } 
        }
        
        function excluirMesAtual() { 
            if(Object.keys(bancoDeDados).length > 1 && confirm(Excluir o mês de ${mesAtivo}?)) { 
                delete bancoDeDados[mesAtivo]; 
                mesAtivo = Object.keys(bancoDeDados)[0]; 
                salvar(); renderizarTudo(); 
            } else if(Object.keys(bancoDeDados).length <= 1) {
                alert("O sistema deve ter pelo menos um mês.");
            }
        }

        renderizarTudo();
    </script>
</body>
</html>
